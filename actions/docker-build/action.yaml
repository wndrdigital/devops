name: "Docker Build & Push"
description: "Build and push Docker image to GHCR"

inputs:
  image:
    description: "Full GHCR image name (e.g. ghcr.io/wndrdigital/my-app)"
    required: true
  docker-username:
    description: "Docker Hub username"
    required: true
  docker-password:
    description: "Docker Hub password"
    required: true
  github-token:
    description: "GitHub token for GHCR"
    required: true
  composer-auth:
    description: "COMPOSER_AUTH JSON string for private packages"
    required: false
    default: ""
  context:
    description: "Docker build context"
    required: false
    default: "."
  dockerfile:
    description: "Path to Dockerfile"
    required: false
    default: "Dockerfile"

runs:
  using: "composite"
  steps:
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.docker-username }}
        password: ${{ inputs.docker-password }}

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Write composer auth secret file
      if: inputs.composer-auth != ''
      shell: bash
      run: |
        echo '${{ inputs.composer-auth }}' > /tmp/composer_auth_secret

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: |
          ${{ inputs.image }}:${{ github.sha }}
          ${{ inputs.image }}:latest
        secret-files: |
          composer_auth=/tmp/composer_auth_secret

    - name: Cleanup secret file
      if: always()
      shell: bash
      run: rm -f /tmp/composer_auth_secret
