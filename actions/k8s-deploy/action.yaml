name: "Kubernetes Deploy"
description: "Deploy application to Kubernetes with Infisical operator secrets"

inputs:
  namespace:
    description: "Kubernetes namespace"
    required: true
  app-name:
    description: "Application/deployment name"
    required: true
  image:
    description: "Full GHCR image name"
    required: true
  ghcr-pat:
    description: "GHCR Personal Access Token for image pull secret"
    required: true
  k8s-dir:
    description: "Path to k8s manifests directory"
    required: false
    default: "k8s"

runs:
  using: "composite"
  steps:
    - name: Apply namespace
      shell: bash
      run: kubectl apply -f ${{ inputs.k8s-dir }}/namespace.yaml

    - name: Create image pull secret
      shell: bash
      run: |
        kubectl create secret docker-registry ghcr-login-secret \
          --namespace=${{ inputs.namespace }} \
          --docker-server=ghcr.io \
          --docker-username=wndrdigital \
          --docker-password=${{ inputs.ghcr-pat }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Apply Infisical secret sync
      shell: bash
      run: kubectl apply -f ${{ inputs.k8s-dir }}/infisical-secret.yaml

    - name: Update image tags
      shell: bash
      run: |
        sed -i "s|${{ inputs.image }}:latest|${{ inputs.image }}:${{ github.sha }}|g" ${{ inputs.k8s-dir }}/backend-deployment.yaml
        if [ -f "${{ inputs.k8s-dir }}/migrate-job.yaml" ]; then
          sed -i "s|${{ inputs.image }}:latest|${{ inputs.image }}:${{ github.sha }}|g" ${{ inputs.k8s-dir }}/migrate-job.yaml
        fi

    - name: Run database migrations
      shell: bash
      run: |
        if [ -f "${{ inputs.k8s-dir }}/migrate-job.yaml" ]; then
          kubectl delete job ${{ inputs.app-name }}-migrate -n ${{ inputs.namespace }} --ignore-not-found
          kubectl apply -f ${{ inputs.k8s-dir }}/migrate-job.yaml
          kubectl wait --for=condition=complete job/${{ inputs.app-name }}-migrate -n ${{ inputs.namespace }} --timeout=120s
        fi

    - name: Apply manifests
      shell: bash
      run: |
        kubectl apply -f ${{ inputs.k8s-dir }}/services.yaml
        kubectl apply -f ${{ inputs.k8s-dir }}/backend-deployment.yaml
        kubectl apply -f ${{ inputs.k8s-dir }}/ingress.yaml
        if [ -f "${{ inputs.k8s-dir }}/queue-deployment.yaml" ]; then
          sed -i "s|${{ inputs.image }}:latest|${{ inputs.image }}:${{ github.sha }}|g" ${{ inputs.k8s-dir }}/queue-deployment.yaml
          kubectl apply -f ${{ inputs.k8s-dir }}/queue-deployment.yaml
        fi

    - name: Wait for rollout
      shell: bash
      run: |
        kubectl rollout status deployment/${{ inputs.app-name }} -n ${{ inputs.namespace }} --timeout=300s
